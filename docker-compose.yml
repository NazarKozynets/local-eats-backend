services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: localeats-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: localeats
    volumes:
      - localeats_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: localeats-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - localeats_redis_data:/data

volumes:
  localeats_postgres_data:
  localeats_redis_data: